<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>emu — Flutter debug</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><img src="favicon.png" alt="" class="brand-icon" />emu<span class="dot" id="conn-dot" title="disconnected"></span></div>
    <div class="status" id="status">
      <span class="pill" id="state-pill">stopped</span>
      <span id="device-name" class="muted"></span>
      <a id="devtools" class="muted" href="#" target="_blank" hidden>DevTools ↗</a>
    </div>
    <div class="actions">
      <button id="btn-reload" title="Hot reload (r)">↻ Reload</button>
      <button id="btn-restart" title="Hot restart (R)">⟳ Restart</button>
      <button id="btn-cold" title="Cold restart">❄ Cold</button>
      <button id="btn-stop" class="danger" title="Stop the app">■ Stop</button>
      <button id="btn-shot" title="Screenshot">▣ Shot</button>
    </div>
  </header>

  <div class="toolbar">
    <input id="search" type="text" placeholder="search logs (regex)…" autocomplete="off" />
    <label class="chk"><input type="checkbox" id="regex" /> regex</label>
    <div class="levels">
      <button class="lvl active" data-level="all">all</button>
      <button class="lvl" data-level="debug">debug</button>
      <button class="lvl" data-level="info">info</button>
      <button class="lvl" data-level="warn">warn</button>
      <button class="lvl" data-level="error">error</button>
    </div>
    <span class="grow"></span>
    <label class="chk"><input type="checkbox" id="autoscroll" checked /> autoscroll</label>
    <button id="btn-clear" title="Clear log view">clear</button>
    <button id="btn-copy" title="Copy visible logs">copy</button>
    <span class="count" id="count">0</span>
  </div>

  <div class="workspace">
    <main id="log" class="log"></main>
    <aside class="screen" id="screen">
      <div class="screen-head">
        <span>screen</span>
        <label class="chk"><input type="checkbox" id="shot-auto" /> auto</label>
        <button id="shot-refresh" title="Refresh screenshot">↻</button>
      </div>
      <div class="screen-view" id="screen-view">
        <img id="shot-img" alt="device screen" hidden />
        <div class="screen-empty" id="screen-empty">no screen yet — press ↻ (needs a running app)</div>
      </div>
      <div class="screen-hint">click to tap · drag to swipe</div>
      <div class="screen-input">
        <input id="text-input" type="text" placeholder="type into focused field…" autocomplete="off" />
        <button id="text-send" title="Send text (tap a field first)">send</button>
      </div>
    </aside>
  </div>

  <div class="actionbar" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
